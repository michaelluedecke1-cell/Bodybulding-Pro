          displayEl.textContent = formatTime(pauseSec);
          displayEl.classList.remove('alarm');
          const canvas = document.getElementById(`timer-${currentTimerLogId}-${currentTimerExId}-canvas`);
          if (canvas) drawTimerCircle(canvas, pauseSec, pauseSec);
        }

        // Nur Piepton, kein Alert, kein Haken, kein Neuladen
        playBeep();
        const exName = exercises.find(e => e.id === currentTimerExId)?.name || 'Übung';
        sendNotification(`Pause für ${exName} beendet!`);
        if (navigator.vibrate) navigator.vibrate(200);

        currentTimerLogId = null;
        currentTimerExId = null;
      }
    }

    function toggleTimer(logId, exId, btnElement) {
      // Wenn ein anderer Timer läuft, stoppen
      if (timerRunning && (currentTimerLogId !== logId || currentTimerExId !== exId)) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        document.querySelectorAll('.btn-timer').forEach(b => {
          if (b.dataset.logid === currentTimerLogId && b.dataset.exid === currentTimerExId) {
            b.innerHTML = '<i class="fas fa-play"></i> Timer starten';
            b.classList.remove('active');
          }
        });
        const oldDisplay = document.getElementById(`timer-${currentTimerLogId}-${currentTimerExId}`);
        if (oldDisplay) oldDisplay.classList.remove('alarm');
      }

      // Wenn der gleiche Timer läuft, stoppen
      if (timerRunning && currentTimerLogId === logId && currentTimerExId === exId) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;
        btnElement.innerHTML = '<i class="fas fa-play"></i> Timer starten';
        btnElement.classList.remove('active');
        const display = document.getElementById(`timer-${logId}-${exId}`);
        if (display) display.classList.remove('alarm');
        return;
      }

      // Timer starten
      const ex = exercises.find(e => e.id === exId);
      if (!ex) return;
      const pauseSec = ex.pause || 90;
      timerTotalSeconds = pauseSec;
      timerStartTime = Date.now();
      timerRemainingSeconds = pauseSec;
      currentTimerLogId = logId;
      currentTimerExId = exId;
      timerRunning = true;
      btnElement.innerHTML = '<i class="fas fa-stop"></i> Stopp';
      btnElement.classList.add('active');

      const display = document.getElementById(`timer-${logId}-${exId}`);
      if (display) {
        display.textContent = formatTime(pauseSec);
        display.classList.remove('alarm');
        const canvas = document.getElementById(`timer-${logId}-${exId}-canvas`);
        if (canvas) drawTimerCircle(canvas, pauseSec, pauseSec);
      }

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimerDisplay, 1000);
    }

    // ========== STATISTIK ==========
    let showAllStats = false;
    function renderStats() {
      if (!statsContainer) return;
      const totalLogs = logs.length;
      if (totalLogs === 0) {
        statsContainer.innerHTML = `<div class="empty-state">Noch keine Trainingsdaten für Statistiken.<br/>Mache dein erstes Training!</div>`;
        return;
      }

      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();
      const daysThisMonth = logs.filter(log => {
        if (!log.date) return false;
        const [y, m, d] = log.date.split('-');
        const logD = new Date(y, m - 1, d);
        return logD.getMonth() === currentMonth && logD.getFullYear() === currentYear;
      }).length;

      let lastTrainingVolume = 0;
      if (logs.length > 0) {
        const sortedLogs = [...logs].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
        const lastLog = sortedLogs[0];
        lastLog.entries.forEach(entry => { lastTrainingVolume += calcVolume(entry); });
      }

      const exerciseProgress = [];
      const exerciseLogs = {};
      logs.forEach(log => {
        if (!log.date) return;
        log.entries.forEach(entry => {
          const exId = entry.exerciseId;
          if (!exId) return;
          const vol = calcVolume(entry);
          if (!exerciseLogs[exId]) exerciseLogs[exId] = [];
          exerciseLogs[exId].push({ date: log.date, volume: vol });
        });
      });

      Object.keys(exerciseLogs).forEach(exId => {
        const entries = exerciseLogs[exId];
        if (entries.length < 2) return;
        entries.sort((a, b) => a.date.localeCompare(b.date));
        const last = entries[entries.length - 1];
        const prev = entries[entries.length - 2];
        const diff = last.volume - prev.volume;
        const percent = prev.volume > 0 ? (diff / prev.volume) * 100 : 0;
        const ex = exercises.find(e => e.id === exId);
        if (ex) {
          exerciseProgress.push({
            name: ex.name,
            lastVolume: last.volume,
            prevVolume: prev.volume,
            diff: diff,
            percent: percent
          });
        }
      });

      exerciseProgress.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
      let filtered = showAllStats ? exerciseProgress : exerciseProgress.filter(p => p.diff !== 0);

      const days = [];
      const todayMidnight = new Date();
      todayMidnight.setHours(0,0,0,0);
      for (let i = 6; i >= 0; i--) {
        const targetDate = new Date(todayMidnight);
        targetDate.setDate(targetDate.getDate() - i);
        const dayName = targetDate.toLocaleDateString('de-DE', { weekday: 'short' });
        const dayLabel = `${dayName} ${targetDate.getDate()}.`;
        let dayVol = 0;
        logs.forEach(log => {
          if (!log.date) return;
          const [y, m, d] = log.date.split('-');
          const logDate = new Date(y, m - 1, d);
          logDate.setHours(0,0,0,0);
          if (logDate.getTime() === targetDate.getTime()) {
            log.entries.forEach(entry => { dayVol += calcVolume(entry); });
          }
        });
        days.push({ label: dayLabel, vol: dayVol });
      }

      let html = `
        <div class="stat-card">
          <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:space-around;">
            <div><span class="stat-value">${daysThisMonth}</span><div class="stat-label">Trainingstage diesen Monat</div></div>
            <div><span class="stat-value">${totalLogs}</span><div class="stat-label">Trainings insgesamt</div></div>
            <div><span class="stat-value">${lastTrainingVolume.toLocaleString()}</span><div class="stat-label">Letztes Training (kg)</div></div>
          </div>
        </div>
        <div class="stat-card">
          <div style="font-weight:600; margin-bottom:6px; font-size:0.9rem;">📊 Tägliches Volumen (letzte 7 Tage)</div>
          <div style="display:flex; gap:3px; justify-content:space-around; align-items:flex-end; height:80px; padding-top:6px;">
      `;
      const maxDayVol = Math.max(...days.map(d => d.vol), 1);
      days.forEach(d => {
        const height = Math.max(4, (d.vol / maxDayVol) * 64);
        html += `
          <div style="display:flex; flex-direction:column; align-items:center; flex:1;">
            <div style="background:#2ecc71; width:100%; max-width:20px; height:${height}px; border-radius:3px 3px 0 0;"></div>
            <div style="font-size:0.55rem; color:#888; margin-top:3px; text-align:center;">${d.label}</div>
            <div style="font-size:0.5rem; color:#aaa;">${d.vol > 0 ? d.vol.toLocaleString() : '-'}</div>
          </div>
        `;
      });
      html += `</div></div>`;

      html += `
        <div class="stat-card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:4px;">
            <span style="font-weight:600; font-size:0.9rem;">📈 Fortschritt pro Übung</span>
            <div class="stat-toggle ${showAllStats ? 'active' : ''}" id="statToggle">
              <i class="fas ${showAllStats ? 'fa-eye' : 'fa-eye-slash'}"></i>
              ${showAllStats ? 'Alle anzeigen' : 'Nur Veränderung'}
            </div>
          </div>
          <ul class="stat-progress-list">
      `;
      if (filtered.length === 0) {
        html += `<li class="empty-state" style="padding:8px 0;">Keine Übungen mit Veränderung gefunden.</li>`;
      } else {
        filtered.forEach(item => {
          const diffClass = item.diff > 0 ? 'up' : (item.diff < 0 ? 'down' : 'neutral');
          const sign = item.diff > 0 ? '▲' : (item.diff < 0 ? '▼' : '●');
          const percentStr = item.percent !== 0 ? (item.percent > 0 ? '+' : '') + item.percent.toFixed(1) + '%' : '±0%';
          html += `
            <li>
              <div class="ex-name">${item.name}</div>
              <div class="ex-stats">
                <span class="ex-current">${item.lastVolume.toLocaleString()} kg</span>
                <span class="ex-change ${diffClass}">${sign} ${Math.abs(item.diff).toLocaleString()} kg (${percentStr})</span>
              </div>
              <div class="ex-previous">vorher: ${item.prevVolume.toLocaleString()} kg</div>
            </li>
          `;
        });
      }
      html += `</ul></div>`;

      statsContainer.innerHTML = html;
      document.getElementById('statToggle')?.addEventListener('click', function() {
        showAllStats = !showAllStats;
        renderStats();
      });
    }

    // ========== KALENDER ==========
    function renderCalendar() {
      if (!calendarContainer) return;
      if (calendarView === 'year') {
        renderYearView();
        return;
      }
      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();
      const todayStr = getToday();

      const firstDay = new Date(year, month, 1);
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const startDayOfWeek = firstDay.getDay();

      const logMap = {};
      logs.forEach(log => { if (log.date) logMap[log.date] = log.id; });

      let html = `
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="nav-btn" id="calPrev">‹</button>
            <span class="month-year">${firstDay.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' })}</span>
            <button class="nav-btn" id="calNext">›</button>
            <button class="nav-btn" id="calYearView" style="background:linear-gradient(135deg,#f39c12,#e67e22); color:#fff; padding:0 10px; font-size:0.8rem;">Jahr</button>
          </div>
          <div class="calendar-grid">
            <div class="day-name">Mo</div><div class="day-name">Di</div><div class="day-name">Mi</div>
            <div class="day-name">Do</div><div class="day-name">Fr</div><div class="day-name">Sa</div>
            <div class="day-name">So</div>
      `;
      let startOffset = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1;
      for (let i = 0; i < startOffset; i++) {
        const prevDate = new Date(year, month, 0 - (startOffset - i - 1));
        html += `<div class="day-cell other-month">${prevDate.getDate()}</div>`;
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        const hasTraining = !!logMap[dateStr];
        let classes = 'day-cell';
        if (isToday) classes += ' today';
        if (hasTraining) classes += ' has-training';
        html += `<div class="${classes}" data-date="${dateStr}" data-logid="${logMap[dateStr]||''}">${d}</div>`;
      }
      const remaining = (7 - ((startOffset + daysInMonth) % 7)) % 7;
      for (let i = 1; i <= remaining; i++) {
        const nextDate = new Date(year, month + 1, i);
        html += `<div class="day-cell other-month">${nextDate.getDate()}</div>`;
      }
      html += `</div>`;

      const monthStr = String(month+1).padStart(2,'0');
      const logsThisMonth = logs.filter(log => log.date && log.date.startsWith(`${year}-${monthStr}`));
      const daysTrained = logsThisMonth.length;
      let totalVol = 0;
      logsThisMonth.forEach(log => {
        log.entries.forEach(entry => { totalVol += calcVolume(entry); });
      });
      const avgVol = daysTrained > 0 ? Math.round(totalVol / daysTrained) : 0;

      html += `
        <div class="calendar-stats">
          <span>📅 Trainingstage: <span class="count">${daysTrained}</span></span>
          <span>📊 Volumen: <span class="count">${totalVol} kg</span></span>
          <span>📈 Ø: <span class="count">${avgVol} kg</span></span>
        </div>
      </div>`;

      calendarContainer.innerHTML = html;

      document.getElementById('calPrev')?.addEventListener('click', () => {
        calendarDate.setMonth(calendarDate.getMonth() - 1);
        renderCalendar();
      });
      document.getElementById('calNext')?.addEventListener('click', () => {
        calendarDate.setMonth(calendarDate.getMonth() + 1);
        renderCalendar();
      });
      document.getElementById('calYearView')?.addEventListener('click', () => {
        calendarView = 'year';
        renderCalendar();
      });
      document.querySelectorAll('.day-cell.has-training').forEach(el => {
        el.addEventListener('click', function() {
          const logId = this.dataset.logid;
          if (logId) {
            showTab('logs');
            openLogForm(logId, false);
          }
        });
      });
    }

    function renderYearView() {

      const todayStr = getToday();
      const logMap = {};
      logs.forEach(log => { if (log.date) logMap[log.date] = log.id; });

      const yearStr = String(year);
      const logsThisYear = logs.filter(log => log.date && log.date.startsWith(yearStr));
      const daysTrained = logsThisYear.length;
      let totalVol = 0;
      logsThisYear.forEach(log => {
        log.entries.forEach(entry => { totalVol += calcVolume(entry); });
      });
      const avgVol = daysTrained > 0 ? Math.round(totalVol / daysTrained) : 0;

      let html = `
        <div class="calendar-container">
          <div class="calendar-header">
            <button class="nav-btn" id="yearPrev">‹</button>
            <span class="month-year">${year}</span>
            <button class="nav-btn" id="yearNext">›</button>
            <button class="nav-btn" id="yearMonthView" style="background:linear-gradient(135deg,#f39c12,#e67e22); color:#fff; padding:0 10px; font-size:0.8rem;">Monat</button>

          <div class="calendar-year-grid">

        const daysInMonth = new Date(year, m + 1, 0).getDate();
        const firstDay = new Date(year, m, 1).getDay();
        let startOffset = firstDay === 0 ? 6 : firstDay - 1;
        let miniDaysHtml = '';
        for (let i = 0; i < startOffset; i++) {
          miniDaysHtml += `<div class="mini-day other-month"></div>`;
        }
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hasTraining = !!logMap[dateStr];
          const isToday = dateStr === todayStr;
          let cls = 'mini-day';
          if (hasTraining) cls += ' has-training';
          if (isToday) cls += ' today';
          miniDaysHtml += `<div class="${cls}" data-date="${dateStr}" data-logid="${logMap[dateStr]||''}">${d}</div>`;
        }
        const total = startOffset + daysInMonth;
        const rem = (7 - (total % 7)) % 7;
        for (let i = 0; i < rem; i++) {
          miniDaysHtml += `<div class="mini-day other-month"></div>`;
        }
        html += `
          <div class="month-card">
            <div class="month-name">${monthName}</div>
            <div class="mini-days">${miniDaysHtml}</div>
          </div>
        `;
      }
      html += `
          </div>
          <div class="calendar-stats">
            <span>📅 Trainingstage: <span class="count">${daysTrained}</span></span>
            <span>📊 Volumen: <span class="count">${totalVol} kg</span></span>
            <span>📈 Ø: <span class="count">${avgVol} kg</span></span>
          </div>
        </div>
      `;
      calendarContainer.innerHTML = html;

      document.getElementById('yearPrev')?.addEventListener('click', () => {
        calendarDate.setFullYear(calendarDate.getFullYear() - 1);
        renderCalendar();
      });
      document.getElementById('yearNext')?.addEventListener('click', () => {
        calendarDate.setFullYear(calendarDate.getFullYear() + 1);
        renderCalendar();
      });
      document.getElementById('yearMonthView')?.addEventListener('click', () => {
        calendarView = 'month';
        renderCalendar();
      });
      document.querySelectorAll('.mini-day.has-training').forEach(el => {
        el.addEventListener('click', function() {
          const logId = this.dataset.logid;
          if (logId) {
            showTab('logs');
            openLogForm(logId, false);
          }
        });
      });
    }

    // ========== BACKUP ==========
    function exportData() {
      const data = { exercises, plans, logs };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `bb_pro_backup_${getToday()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    function importData(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.exercises && data.plans && data.logs) {
            if (confirm('Aktuelle Daten werden durch die importierten ersetzt. Fortfahren?')) {
              exercises = data.exercises; plans = data.plans; logs = data.logs;
              saveData(); renderAll();
              backupOverlay.classList.remove('active');
              alert('Import erfolgreich!');
            }
          } else { alert('Ungültige Backup-Datei.'); }
        } catch(err) { alert('Fehler beim Lesen der Datei.'); }
      };
      reader.readAsText(file);
    }
    async function restoreAutoBackup() {
      try {
        const autoBackup = await idbGet('bb_auto_backup');
        if (!autoBackup) { alert('Kein automatisches Backup vorhanden.'); return; }
        if (autoBackup.exercises && autoBackup.plans && autoBackup.logs) {
          if (confirm('Auto-Backup wiederherstellen? Aktuelle Daten werden überschrieben.')) {
            exercises = autoBackup.exercises;
            plans = autoBackup.plans;
            logs = autoBackup.logs;
            activePlanId = autoBackup.activePlanId || null;
            saveData();
            renderAll();
            backupOverlay.classList.remove('active');
            alert('Auto-Backup erfolgreich wiederhergestellt!');
          }
        } else {
          alert('Auto-Backup enthält ungültige Daten.');
        }
      } catch(e) {
        alert('Fehler beim Lesen des Auto-Backups.');
      }
    }

    // ========== UI-HILFEN ==========
    function hideAllPages() { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); }
    function closeDetail() {
      if (overallTimerRunning) releaseOverallTimer();
      detailContainer.style.display = 'none';
      showTab(currentTab);
      editingId = null; editingType = null;
      if (timerRunning) {
        clearInterval(timerInterval); timerInterval = null; timerRunning = false;
        document.querySelectorAll('.btn-timer').forEach(b => {
          b.innerHTML = '<i class="fas fa-play"></i> Timer starten';
          b.classList.remove('active');
        });
        const display = document.getElementById(`timer-${currentTimerLogId}-${currentTimerExId}`);
        if (display) display.classList.remove('alarm');
        currentTimerLogId = null; currentTimerExId = null;
      }
    }
    function showTab(tab) {
      currentTab = tab;
      hideAllPages();
      if (tab === 'exercises') { pageExercises.classList.add('active'); renderExercises(); }
      else if (tab === 'plans') { pagePlans.classList.add('active'); renderPlans(); }
      else if (tab === 'logs') { pageLogs.classList.add('active'); renderLogs(); }
      else if (tab === 'calendar') { pageCalendar.classList.add('active'); renderCalendar(); }
      else if (tab === 'stats') { pageStats.classList.add('active'); renderStats(); }
      tabBtns.forEach(btn => { btn.classList.toggle('active', btn.dataset.tab === tab); });
      detailContainer.style.display = 'none';
    }

    // ========== EVENT DELEGATION ==========
    detailContainer.addEventListener('click', function(e) {
      if (editingType !== 'log') return;
      const target = e.target;

      const btnTimer = target.closest('.btn-timer');
      if (btnTimer) {
        e.preventDefault();
        const logId = btnTimer.dataset.logid;
        const exId = btnTimer.dataset.exid;
        toggleTimer(logId, exId, btnTimer);
        return;
      }

      const btnAddSet = target.closest('.btn-add-set');
      if (btnAddSet) { addSetToLogEntry(btnAddSet.dataset.logid, btnAddSet.dataset.exid); return; }

      const btnRemoveSet = target.closest('.btn-remove-set');
      if (btnRemoveSet) {
        e.preventDefault();
        if (!confirm('Diesen Satz wirklich löschen?')) return;
        removeSetFromLogEntry(btnRemoveSet.dataset.logid, btnRemoveSet.dataset.exid, parseInt(btnRemoveSet.dataset.idx));
        return;
      }

      const btnSetControl = target.closest('.set-controls button');
      if (btnSetControl) {
        e.preventDefault();
        const btn = btnSetControl;
        const field = btn.dataset.field;
        const step = parseFloat(btn.dataset.step) || 0.5;
        const isInc = btn.classList.contains('inc');
        const row = btn.closest('tr');
        const input = row.querySelector(`.set-${field}`);
        if (!input) return;
        let val = parseFloat(input.value) || 0;
        val = isInc ? val + step : val - step;
        if (val < 0) val = 0;
        if (field === 'wdh') val = Math.round(val);
        else val = Math.round(val * 10) / 10;
        input.value = val;
        input.dispatchEvent(new Event('change', { bubbles: true }));
        return;
      }

      const btnDelEx = target.closest('.ex-header .del');
      if (btnDelEx) {
        e.preventDefault();
        if (!confirm('Möchten Sie diese Übung wirklich aus diesem Training entfernen?')) return;
        removeExerciseFromLog(editingId, btnDelEx.dataset.exid);
        return;
      }

      // Klick auf Satzzeile: alle Sätze bis zu diesem als erledigt markieren (MANUELL)
      const trActiveSet = target.closest('.exercise-entry .sets-table tbody tr');
      if (trActiveSet) {
        if (target.tagName === 'INPUT' || target.tagName === 'BUTTON' || target.closest('button')) return;
        const exEntry = trActiveSet.closest('.exercise-entry');
        const exId = exEntry.dataset.exid;
        const logId = exEntry.dataset.logid;
        const idx = parseInt(trActiveSet.dataset.setidx);
        if (isNaN(idx)) return;
        const log = logs.find(l => l.id === logId);
        if (log) {
          const entry = log.entries.find(e => e.exerciseId === exId);
          if (entry) {
            // currentSetIndex = idx + 1 (alle Sätze bis einschließlich idx als erledigt)
            entry.currentSetIndex = Math.min(idx + 1, entry.sets.length);
            saveData();
            openLogForm(logId, overallTimerRunning);
          }
        }
      }
    });

    detailContainer.addEventListener('change', function(e) {
      if (editingType !== 'log') return;
      const target = e.target;

      if (target.classList.contains('set-kg')) {
        updateSetValueInLog(target.dataset.logid, target.dataset.exid, parseInt(target.dataset.idx), 'kg', parseFloat(target.value) || 0);
        updateVolumeDisplay(target.dataset.logid);
      }
      else if (target.classList.contains('set-wdh')) {
        updateSetValueInLog(target.dataset.logid, target.dataset.exid, parseInt(target.dataset.idx), 'wdh', parseInt(target.value) || 0);
        updateVolumeDisplay(target.dataset.logid);
      }
      else if (target.classList.contains('cardio-time')) {
        updateCardioData(target.dataset.logid, target.dataset.exid, 'time', parseFloat(target.value) || 0);
      }
      else if (target.classList.contains('cardio-dist')) {
        updateCardioData(target.dataset.logid, target.dataset.exid, 'distance', parseFloat(target.value) || 0);
      }
      else if (target.classList.contains('ex-notiz-text')) {
        updateNotizInLog(target.dataset.logid, target.dataset.exid, target.value);
      }
    });

    function updateVolumeDisplay(logId) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      const total = log.entries.reduce((sum, entry) => sum + calcVolume(entry), 0);
      const display = document.getElementById('totalVolumeDisplay');
      if (display) display.textContent = total + ' kg';
    }

    // ========== EVENT LISTENER ==========
    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => { showTab(btn.dataset.tab); });
    });
    btnGlobalAdd.addEventListener('click', () => {
      if (currentTab === 'exercises') openExerciseForm(null);
      else if (currentTab === 'plans') openPlanForm(null);
      else if (currentTab === 'logs') openLogForm(null, false);
    });
    btnQuickStart.addEventListener('click', quickStart);
    btnBackup.addEventListener('click', () => {
      backupOverlay.classList.add('active');
      if (lastBackupDateSpan) lastBackupDateSpan.textContent = lastBackupDate || '–';
    });
    btnCloseBackup.addEventListener('click', () => { backupOverlay.classList.remove('active'); });
    btnExport.addEventListener('click', exportData);
    btnImportTrigger.addEventListener('click', () => { fileInput.click(); });
    btnRestoreAutoBackup.addEventListener('click', restoreAutoBackup);
    fileInput.addEventListener('change', function() {
      if (this.files && this.files[0]) { importData(this.files[0]); this.value = ''; }
    });
    backupOverlay.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });

    // Haptisches Feedback
    document.addEventListener('pointerdown', function(e) {
      if (e.target.closest('button') || e.target.closest('.list-item') || e.target.closest('.day-cell.has-training')) {
        if (navigator.vibrate) navigator.vibrate(12);
      }
    }, { passive: true });

    // ========== INIT ==========
    async function initApp() {
      await loadData();
      enablePersistentStorage();
      showTab('exercises');
      if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }
    }

    initApp();
  </script>
</body>
</html>
