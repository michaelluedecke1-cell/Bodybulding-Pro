<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Bodybuilding Pro</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ===== KOMPAKTES DESIGN FÜR HANDY ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    html, body { overscroll-behavior-y: none; }
    body {
      background: #0d0d1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 0 12px 80px;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .app-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 14px;
    }
    .app-header h1 {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #f39c12, #e74c3c);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      background: rgba(255,255,255,0.06);
      border: none; color: #ddd; font-size: 1rem;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn-icon:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }
    .btn-icon.primary {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff; box-shadow: 0 4px 12px rgba(46,204,113,0.3);
    }
    .btn-icon.backup {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: #fff; box-shadow: 0 4px 12px rgba(52,152,219,0.3);
    }
    .btn-icon.quickstart {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: #fff; box-shadow: 0 4px 12px rgba(243,156,18,0.3);
    }

    .tab-bar {
      display: flex; gap: 4px; background: rgba(255,255,255,0.04);
      border-radius: 14px; padding: 4px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .tab-btn {
      flex: 1; background: transparent; border: none; color: #888;
      padding: 8px 0; font-weight: 600; font-size: 0.65rem;
      border-radius: 10px; cursor: pointer; transition: all 0.2s;
      min-width: 44px;
    }
    .tab-btn.active { background: rgba(255,255,255,0.08); color: #fff; }
    .tab-btn:active { transform: scale(0.96); }

    .page { display: none; flex-direction: column; gap: 12px; }
    .page.active { display: flex; }

    .list-item {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      border-left: 4px solid #f39c12;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .list-item:active { background: rgba(255,255,255,0.08); transform: scale(0.98); }
    .list-item .info { flex: 1; }
    .list-item .info h4 { font-size: 0.9rem; font-weight: 600; margin-bottom: 1px; }
    .list-item .info .sub { font-size: 0.7rem; color: #aaa; }
    .list-item .thumbnail {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #f39c12; overflow: hidden;
    }
    .list-item .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .list-item .actions { display: flex; gap: 6px; }
    .list-item .actions button {
      background: none; border: none; color: #aaa; font-size: 1rem;
      cursor: pointer; padding: 0 4px; transition: color 0.2s;
    }
    .list-item .actions .del { color: #e74c3c; }
    .list-item .actions .star { color: #f39c12; }
    .list-item .actions .star.active { color: #2ecc71; }

    .empty-state {
      text-align: center; color: #666; padding: 30px 0; font-size: 0.85rem;
    }

    .detail-card {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .detail-card .row {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .detail-card .row label { flex: 1; min-width: 80px; font-size: 0.75rem; color: #aaa; }
    .detail-card input, .detail-card textarea, .detail-card select {
      width: 100%; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 8px 10px; color: #fff;
      font-size: 0.85rem; transition: border 0.2s;
    }
    .detail-card input:focus, .detail-card textarea:focus, .detail-card select:focus {
      border-color: #2ecc71; outline: none;
    }

    .btn-row {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .btn-row button {
      flex: 1; padding: 10px; border: none; border-radius: 12px;
      font-weight: 700; font-size: 0.85rem; cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-row button:active { transform: scale(0.96); }
    .btn-save {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff; box-shadow: 0 4px 12px rgba(46,204,113,0.3);
    }
    .btn-cancel { background: rgba(255,255,255,0.08); color: #fff; }
    .btn-danger {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff; box-shadow: 0 4px 12px rgba(231,76,60,0.3);
    }

    .plan-exercise-list {
      list-style: none; padding: 0; margin: 4px 0;
    }
    .plan-exercise-list li {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04);
      padding: 8px 10px; border-radius: 10px;
      margin-bottom: 4px; border: 1px solid rgba(255,255,255,0.06);
    }
    .plan-exercise-list li input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: #2ecc71; flex-shrink: 0;
    }
    .plan-exercise-list li .ex-name { flex: 1; font-size: 0.8rem; }
    .plan-exercise-list li .ex-type { font-size: 0.65rem; color: #888; }
    .plan-exercise-list li .move-buttons { display: flex; gap: 4px; }
    .plan-exercise-list li .move-buttons button {
      background: rgba(255,255,255,0.06);
      border: none; color: #ddd; font-size: 1rem;
      width: 26px; height: 26px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .plan-exercise-list li .move-buttons button:active { background: rgba(255,255,255,0.12); }

    .exercise-entry {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 10px 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .exercise-entry .ex-header {
      display: flex; justify-content: space-between; align-items: center;
    }
    .exercise-entry .ex-header .ex-name { font-weight: 600; font-size: 0.85rem; }
    .exercise-entry .ex-header .ex-actions button {
      background: none; border: none; color: #aaa; font-size: 0.9rem;
      cursor: pointer; padding: 0 4px;
    }
    .exercise-entry .ex-header .ex-actions .del { color: #e74c3c; }
    .exercise-entry img {
      max-width: 100%; max-height: 60px; object-fit: contain;
      border-radius: 8px; margin: 4px 0; background: rgba(0,0,0,0.3);
    }

    .exercise-entry .sets-table input[type="number"] {
      width: 48px; font-size: 0.85rem; padding: 4px 2px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #fff; text-align: center;
      -moz-appearance: textfield;
    }
    .exercise-entry .sets-table input[type="number"]::-webkit-outer-spin-button,
    .exercise-entry .sets-table input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .exercise-entry .sets-table .set-controls {
      display: flex; align-items: center; gap: 4px;
    }
    .exercise-entry .sets-table .set-controls button {
      background: rgba(255,255,255,0.06);
      border: none; color: #ddd;
      font-size: 1.2rem;
      width: 30px; height: 30px;
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .exercise-entry .sets-table .set-controls button:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }
    .exercise-entry .sets-table .set-controls button.inc { color: #2ecc71; }
    .exercise-entry .sets-table .set-controls button.dec { color: #e74c3c; }

    .exercise-entry .sets-table {
      width: 100%; border-collapse: collapse; margin: 4px 0;
    }
    .exercise-entry .sets-table th {
      text-align: left; padding: 4px 4px; color: #888;
      font-weight: 400; font-size: 0.65rem; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .exercise-entry .sets-table td {
      padding: 3px 3px; border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .exercise-entry .sets-table .btn-remove-set {
      background: none; border: none; color: #e74c3c;
      font-size: 1rem; cursor: pointer; padding: 0 4px;
    }

    /* Satzmarkierungen */
    .exercise-entry .sets-table .set-number.done {
      color: #2ecc71;
      font-weight: 700;
    }
    .exercise-entry .sets-table .set-number.done::before {
      content: "✓ ";
      color: #2ecc71;
    }
    .exercise-entry .sets-table .set-number.active {
      background: rgba(46, 204, 113, 0.15);
      border-radius: 4px;
      padding: 0 6px;
      font-weight: 700;
      color: #2ecc71;
    }
    .exercise-entry .sets-table .set-number.just-done {
      animation: setDone 0.4s ease;
    }
    @keyframes setDone {
      0% { transform: scale(1.2); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    .exercise-entry .set-progress {
      font-size: 0.65rem; color: #aaa; margin: 3px 0;
      display: flex; justify-content: space-between;
    }
    .exercise-entry .set-progress .current-set-label {
      color: #2ecc71; font-weight: 600;
    }

    .exercise-entry .ex-actions-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
    }
    .exercise-entry .ex-actions-row button {
      padding: 6px 10px; font-size: 0.75rem; font-weight: 600;
      min-height: 34px; border: none; border-radius: 10px; cursor: pointer;
      background: rgba(255,255,255,0.06); color: #ddd;
      flex: 1; min-width: 70px; transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .exercise-entry .ex-actions-row button:active { transform: scale(0.96); }
    .exercise-entry .ex-actions-row .btn-timer {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: #fff; box-shadow: 0 4px 10px rgba(52,152,219,0.3);
    }
    .exercise-entry .ex-actions-row .btn-timer.active {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      box-shadow: 0 4px 10px rgba(231,76,60,0.3);
    }
    .exercise-entry .ex-actions-row .btn-add-set {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff; box-shadow: 0 4px 10px rgba(46,204,113,0.3);
    }

    .exercise-entry .timer-wrapper {
      position: relative;
      width: 64px;
      height: 64px;
      margin: 4px auto 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .exercise-entry .timer-wrapper canvas {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: block;
    }
    .exercise-entry .timer-wrapper .timer-text {
      position: absolute;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 1.2;
      pointer-events: none;
    }
    .exercise-entry .timer-wrapper .timer-text .sub {
      font-size: 0.5rem;
      font-weight: 400;
      color: #888;
      display: block;
    }
    .exercise-entry .timer-wrapper .timer-text.alarm {
      color: #e74c3c;
      animation: blink 0.5s infinite alternate;
    }
    @keyframes blink {
      0% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    .exercise-entry .ex-notiz {
      background: rgba(255,255,255,0.04);
      padding: 4px 8px; border-radius: 8px; margin-top: 4px;
    }
    .exercise-entry .ex-notiz textarea {
      width: 100%; background: transparent; border: none;
      color: #ddd; resize: vertical; font-size: 0.75rem;
      outline: none; min-height: 24px;
    }

    .volume-summary {
      background: rgba(255,255,255,0.04);
      padding: 6px 10px; border-radius: 10px;
      margin: 4px 0 8px;
      display: flex; flex-wrap: wrap; gap: 12px;
      justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .volume-summary .item { text-align: center; }
    .volume-summary .item .label { font-size: 0.6rem; color: #888; }
    .volume-summary .item .value { font-size: 0.95rem; font-weight: 700; color: #2ecc71; }

    .cardio-row {
      display: flex; gap: 10px; margin: 4px 0; align-items: center;
      background: rgba(255,255,255,0.04);
      padding: 4px 10px; border-radius: 10px;
    }
    .cardio-row label { font-size: 0.7rem; color: #aaa; }
    .cardio-row input {
      width: 56px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #fff; padding: 4px 6px; font-size: 0.8rem;
    }

    .calendar-container {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .calendar-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .calendar-header .month-year { font-size: 1rem; font-weight: 600; }
    .calendar-header .nav-btn {
      background: rgba(255,255,255,0.06);
      border: none; color: #ddd; font-size: 1.1rem;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .calendar-header .nav-btn:active { background: rgba(255,255,255,0.12); }
    .calendar-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 3px; text-align: center;
    }
    .calendar-grid .day-name {
      font-size: 0.6rem; color: #666; padding: 4px 0;
    }
    .calendar-grid .day-cell {
      background: rgba(255,255,255,0.04);
      border-radius: 6px; padding: 6px 0;
      font-size: 0.75rem; cursor: default; transition: background 0.2s;
      position: relative;
    }
    .calendar-grid .day-cell.other-month { color: #444; }
    .calendar-grid .day-cell.has-training {
      background: rgba(46,204,113,0.15);
      cursor: pointer;
    }
    .calendar-grid .day-cell.has-training::after {
      content: ''; position: absolute; bottom: 2px; left: 50%;
      transform: translateX(-50%); width: 4px; height: 4px;
      border-radius: 50%; background: #2ecc71;
    }
    .calendar-grid .day-cell.today { border: 1px solid #f39c12; }
    .calendar-grid .day-cell:active { background: rgba(255,255,255,0.08); }

    .calendar-year-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin: 8px 0;
    }
    .calendar-year-grid .month-card {
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 6px 4px;
      text-align: center; border: 1px solid rgba(255,255,255,0.06);
    }
    .calendar-year-grid .month-card .month-name {
      font-size: 0.6rem; color: #aaa; margin-bottom: 2px;
    }
    .calendar-year-grid .month-card .mini-days {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
    }
    .calendar-year-grid .month-card .mini-day {
      aspect-ratio: 1; border-radius: 2px;
      background: rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.35rem; color: #555; cursor: default;
    }
    .calendar-year-grid .month-card .mini-day.has-training {
      background: #2ecc71; color: #0d0d1a; font-weight: 700; cursor: pointer;
    }
    .calendar-year-grid .month-card .mini-day.other-month { opacity: 0.3; }

    .calendar-stats {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin-top: 10px; font-size: 0.75rem; color: #aaa;
    }
    .calendar-stats span { background: rgba(255,255,255,0.04); padding: 4px 12px; border-radius: 16px; }
    .calendar-stats .count { color: #2ecc71; font-weight: 700; }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .stat-card .stat-value {
      font-size: 1.5rem; font-weight: 700; color: #2ecc71;
    }
    .stat-card .stat-label { font-size: 0.7rem; color: #aaa; }

    .stat-progress-list {
      list-style: none; padding: 0; margin: 0;
    }
    .stat-progress-list li {
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.06);
      display: flex; flex-direction: column;
    }
    .stat-progress-list .ex-name {
      font-weight: 600; font-size: 0.85rem; color: #ddd;
    }
    .stat-progress-list .ex-stats {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 2px;
    }
    .stat-progress-list .ex-current {
      font-size: 1rem; font-weight: 700; color: #2ecc71;
    }
    .stat-progress-list .ex-change {
      font-size: 0.8rem; font-weight: 600;
    }
    .stat-progress-list .ex-change.up { color: #2ecc71; }
    .stat-progress-list .ex-change.down { color: #e74c3c; }
    .stat-progress-list .ex-change.neutral { color: #888; }
    .stat-progress-list .ex-previous {
      font-size: 0.65rem; color: #888; margin-top: 2px;
    }
    .stat-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.06);
      padding: 4px 12px; border-radius: 16px;
      font-size: 0.7rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
      user-select: none; transition: background 0.2s;
    }
    .stat-toggle.active { background: rgba(46,204,113,0.15); border-color: #2ecc71; }
    .stat-toggle:active { transform: scale(0.96); }

    .backup-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center; align-items: center;
      z-index: 1000; backdrop-filter: blur(6px);
    }
    .backup-overlay.active { display: flex; }
    .backup-modal {
      background: #1a1a2e;
      padding: 24px;
      border-radius: 18px;
      max-width: 90%; width: 380px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .backup-modal h3 { margin-bottom: 6px; font-size: 1.2rem; }
    .backup-modal .backup-info {
      font-size: 0.75rem; color: #888; margin-bottom: 14px;
    }
    .backup-modal .backup-info span { color: #2ecc71; }
    .backup-modal .btn-row {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap; margin-top: 14px;
    }
    .backup-modal .btn-row button {
      padding: 8px 16px; border: none; border-radius: 10px;
      font-weight: 600; cursor: pointer; transition: transform 0.1s; font-size: 0.8rem;
    }
    .backup-modal .btn-row button:active { transform: scale(0.96); }

    .wake-toggle {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.06);
      padding: 4px 12px; border-radius: 16px;
      font-size: 0.7rem; cursor: pointer; transition: background 0.3s;
      border: 1px solid rgba(255,255,255,0.08); user-select: none;
    }
    .wake-toggle.active { background: rgba(46,204,113,0.15); border-color: #2ecc71; }
    .wake-toggle:active { transform: scale(0.96); }

    .chart-container {
      background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 8px;
      margin: 4px 0; border: 1px solid rgba(255,255,255,0.06);
      overflow-x: auto;
    }
    .chart-container canvas { width: 100%; height: 80px; }

    @media (min-width: 600px) {
      body { max-width: 480px; margin: 0 auto; padding: 10px 16px 80px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>🏋️ Pro</h1>
      <div class="header-actions">
        <button class="btn-icon quickstart" id="btnQuickStart" title="Training starten"><i class="fas fa-play"></i></button>
        <button class="btn-icon backup" id="btnBackup" title="Backup & Auto-Backup"><i class="fas fa-database"></i></button>
        <button class="btn-icon primary" id="btnGlobalAdd" title="Neu"><i class="fas fa-plus"></i></button>
      </div>
    </header>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="exercises"><i class="fas fa-dumbbell"></i> Übungen</button>
      <button class="tab-btn" data-tab="plans"><i class="fas fa-list"></i> Pläne</button>
      <button class="tab-btn" data-tab="logs"><i class="fas fa-history"></i> Logs</button>
      <button class="tab-btn" data-tab="calendar"><i class="fas fa-calendar-alt"></i> Kalender</button>
      <button class="tab-btn" data-tab="stats"><i class="fas fa-chart-bar"></i> Statistik</button>
    </div>

    <div id="page-exercises" class="page active"><div id="exerciseList" class="list-container"></div></div>
    <div id="page-plans" class="page"><div id="planList" class="list-container"></div></div>
    <div id="page-logs" class="page"><div id="logList" class="list-container"></div></div>
    <div id="page-calendar" class="page"><div id="calendarContainer"></div></div>
    <div id="page-stats" class="page"><div id="statsContainer"></div></div>

    <div id="detailContainer" style="display:none;"></div>

    <div id="backupOverlay" class="backup-overlay">
      <div class="backup-modal">
        <h3>💾 Backup & Wiederherstellung</h3>
        <p class="backup-info" id="backupInfo">Letztes Backup: <span id="lastBackupDate">–</span></p>
        <p style="margin-bottom:10px; font-size:0.8rem; color:#aaa;">
          Automatisches Backup wird bei jedem Speichern erstellt.
        </p>
        <div class="btn-row">
          <button class="btn-save" id="btnExport"><i class="fas fa-download"></i> Exportieren</button>
          <button class="btn-cancel" id="btnImportTrigger"><i class="fas fa-upload"></i> Importieren</button>
          <button class="btn-save" id="btnRestoreAutoBackup" style="background:linear-gradient(135deg,#f39c12,#e67e22); color:#fff;"><i class="fas fa-undo-alt"></i> Auto-Backup</button>
          <button class="btn-danger" id="btnCloseBackup"><i class="fas fa-times"></i> Schließen</button>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display:none;" />
      </div>
    </div>
  </div>

  <script>
    // ===== JS-FALLBACK FÜR IOS PULL-TO-REFRESH =====
    let _startY = 0;
    document.addEventListener('touchstart', e => { _startY = e.touches[0].pageY; }, { passive: true });
    document.addEventListener('touchmove', e => {
      const y = e.touches[0].pageY;
      if (window.scrollY === 0 && y > _startY) e.preventDefault();
    }, { passive: false });

    // ========== INDEXED-DB WRAPPER ==========
    const dbPromise = new Promise((resolve, reject) => {
      const request = indexedDB.open('BodybuildingProDB', 1);
      request.onupgradeneeded = (e) => { e.target.result.createObjectStore('store'); };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });

    async function idbSet(key, val) {
      const db = await dbPromise;
      return new Promise((resolve, reject) => {
        const tx = db.transaction('store', 'readwrite');
        tx.objectStore('store').put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbGet(key) {
      const db = await dbPromise;
      return new Promise((resolve, reject) => {
        const tx = db.transaction('store', 'readonly');
        const req = tx.objectStore('store').get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(tx.error);
      });
    }

    // ========== GLOBALE VARIABLEN ==========
    let exercises = [], plans = [], logs = [];
    let currentTab = 'exercises', editingId = null, editingType = null;
    let calendarDate = new Date();
    let calendarView = 'month';
    let activePlanId = null;

    let timerInterval = null, timerRunning = false;
    let currentTimerLogId = null, currentTimerExId = null;
    let timerStartTime = null, timerTotalSeconds = 0, timerRemainingSeconds = 0;
    let wakeLock = null;
    let wakeLockManual = false;

    let overallTimerStart = null;
    let overallTimerInterval = null;
    let overallTimerRunning = false;

    let lastBackupDate = null;

    // ========== DOM-REFERENZEN ==========
    const pageExercises = document.getElementById('page-exercises');
    const pagePlans = document.getElementById('page-plans');
    const pageLogs = document.getElementById('page-logs');
    const pageCalendar = document.getElementById('page-calendar');
    const pageStats = document.getElementById('page-stats');
    const exerciseList = document.getElementById('exerciseList');
    const planList = document.getElementById('planList');
    const logList = document.getElementById('logList');
    const calendarContainer = document.getElementById('calendarContainer');
    const statsContainer = document.getElementById('statsContainer');
    const detailContainer = document.getElementById('detailContainer');
    const btnGlobalAdd = document.getElementById('btnGlobalAdd');
    const btnQuickStart = document.getElementById('btnQuickStart');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const backupOverlay = document.getElementById('backupOverlay');
    const btnBackup = document.getElementById('btnBackup');
    const btnCloseBackup = document.getElementById('btnCloseBackup');
    const btnExport = document.getElementById('btnExport');
    const btnImportTrigger = document.getElementById('btnImportTrigger');
    const btnRestoreAutoBackup = document.getElementById('btnRestoreAutoBackup');
    const fileInput = document.getElementById('fileInput');
    const lastBackupDateSpan = document.getElementById('lastBackupDate');

    // ========== HILFSFUNKTIONEN ==========
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(Math.floor(sec % 60)).padStart(2, '0');
      return `${m}:${s}`;
    }
    function formatDuration(sec) {
      if (sec < 60) return `${Math.floor(sec)}s`;
      const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
      return `${m}m ${s}s`;
    }
    function getToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function formatDate(d) { if (!d) return ''; const p = d.split('-'); return `${p[2]}.${p[1]}.${p[0]}`; }

    function getExerciseIcon(ex) {
      const name = ex.name.toLowerCase();
      if (ex.type === 'cardio') return 'fa-person-running';
      if (name.includes('bankdrücken') || name.includes('bench')) return 'fa-dumbbell';
      if (name.includes('kniebeuge') || name.includes('squat')) return 'fa-person-walking';
      if (name.includes('kreuzheben') || name.includes('deadlift')) return 'fa-weight-hanging';
      if (name.includes('ruder')) return 'fa-rowing';
      if (name.includes('schulter') || name.includes('shoulder')) return 'fa-hand-fist';
      if (name.includes('curl')) return 'fa-hand-sparkles';
      if (name.includes('trizeps') || name.includes('triceps')) return 'fa-hand-back-fist';
      if (name.includes('klimmzug') || name.includes('pull-up')) return 'fa-person-pulling-up';
      if (name.includes('liegestütz') || name.includes('push-up')) return 'fa-person-push-up';
      if (name.includes('plank')) return 'fa-table';
      if (name.includes('laufband') || name.includes('treadmill')) return 'fa-person-running';
      if (name.includes('rad') || name.includes('bike')) return 'fa-bicycle';
      if (name.includes('rudergerät') || name.includes('ergometer')) return 'fa-oar';
      return 'fa-dumbbell';
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
        const g = ctx.createGain();
        o1.connect(g); o2.connect(g); g.connect(ctx.destination);
        o1.frequency.value = 440; o1.type = 'square';
        o2.frequency.value = 660; o2.type = 'sine';
        g.gain.setValueAtTime(0.6, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
        o1.start(); o2.start();
        o1.stop(ctx.currentTime + 0.8); o2.stop(ctx.currentTime + 0.8);
      } catch(e) { console.log('🔔 Timer abgelaufen!'); }
    }
    function sendNotification(msg) {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted') new Notification('⏰ Timer abgelaufen', { body: msg, icon: '🏋️' });
      else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then(p => { if (p === 'granted') new Notification('⏰ Timer abgelaufen', { body: msg, icon: '🏋️' }); });
      }
    }

    // ========== WAKE LOCK ==========
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('✅ WakeLock aktiviert');
          updateWakeToggleUI(true);
        }
      } catch (err) { console.warn('WakeLock nicht verfügbar:', err); updateWakeToggleUI(false); }
    }
    function releaseWakeLock() {
      if (wakeLock) {
        try { wakeLock.release(); wakeLock = null; console.log('✅ WakeLock freigegeben'); updateWakeToggleUI(false); } catch(e) {}
      } else { updateWakeToggleUI(false); }
    }
    function toggleWakeLock() {
      if (wakeLock) { wakeLockManual = true; releaseWakeLock(); }
      else { wakeLockManual = false; requestWakeLock(); }
    }
    function updateWakeToggleUI(active) {
      const btn = document.getElementById('wakeToggleBtn');
      if (btn) {
        if (active) { btn.classList.add('active'); btn.innerHTML = '<i class="fas fa-desktop"></i> Bildschirm an'; }
        else { btn.classList.remove('active'); btn.innerHTML = '<i class="fas fa-desktop"></i> Bildschirm aus'; }
      }
    }

    // ========== PERSISTENT STORAGE ==========
    async function enablePersistentStorage() {
      if ('storage' in navigator && 'persist' in navigator.storage) {
        try {
          const isPersisted = await navigator.storage.persisted();
          if (!isPersisted) {
            const granted = await navigator.storage.persist();
            if (granted) console.log('✅ Persistent Storage aktiviert');
            else console.warn('⚠️ Persistent Storage nicht gewährt');
          } else console.log('✅ Persistent Storage bereits aktiv');
        } catch (err) { console.warn('⚠️ Fehler:', err); }
      }
    }

    // ========== SPEICHERN & LADEN ==========
    function saveData() {
      idbSet('bb_exercises', exercises).catch(console.warn);
      idbSet('bb_plans', plans).catch(console.warn);
      idbSet('bb_logs', logs).catch(console.warn);
      idbSet('bb_activePlan', activePlanId || '').catch(console.warn);
      const backupData = { exercises, plans, logs, activePlanId };
      idbSet('bb_auto_backup', backupData).then(() => {
        lastBackupDate = new Date().toLocaleString('de-DE');
        localStorage.setItem('bb_last_backup', lastBackupDate);
        if (lastBackupDateSpan) lastBackupDateSpan.textContent = lastBackupDate;
        console.log('✅ Auto-Backup gespeichert');
      }).catch(console.warn);
    }

    async function loadData() {
      try {
        const e = await idbGet('bb_exercises'); if (e) exercises = e;
        const p = await idbGet('bb_plans'); if (p) plans = p;
        const l = await idbGet('bb_logs'); if (l) logs = l;
        const act = await idbGet('bb_activePlan'); if (act !== undefined) activePlanId = act;
      } catch(err) { console.warn('Laden fehlgeschlagen:', err); }

      if (exercises.length === 0 && plans.length === 0 && logs.length === 0) {
        const oldEx = localStorage.getItem('bb_exercises');
        if (oldEx) {
          try {
            exercises = JSON.parse(oldEx);
            plans = JSON.parse(localStorage.getItem('bb_plans') || '[]');
            logs = JSON.parse(localStorage.getItem('bb_logs') || '[]');
            activePlanId = localStorage.getItem('bb_activePlan') || null;
            localStorage.removeItem('bb_exercises');
            localStorage.removeItem('bb_plans');
            localStorage.removeItem('bb_logs');
            localStorage.removeItem('bb_activePlan');
            localStorage.removeItem('bb_auto_backup');
            saveData();
          } catch(err) { console.warn('Migrationsfehler:', err); }
        }
      }

      exercises.forEach(ex => { if (!ex.type) ex.type = 'strength'; });
      logs.forEach(log => {
        log.entries.forEach(entry => {
          if (!entry.cardioData) entry.cardioData = { time: 0, distance: 0 };
          if (entry.currentSetIndex === undefined) entry.currentSetIndex = 0;
        });
        if (log.duration === undefined) log.duration = 0;
      });

      if (exercises.length === 0 && plans.length === 0 && logs.length === 0) {
        const autoBackup = await idbGet('bb_auto_backup');
        if (autoBackup && autoBackup.exercises && autoBackup.plans && autoBackup.logs) {
          exercises = autoBackup.exercises;
          plans = autoBackup.plans;
          logs = autoBackup.logs;
          activePlanId = autoBackup.activePlanId || null;
          saveData();
          console.log('✅ Auto-Backup wiederhergestellt');
        } else {
          const ex1 = { id: generateId(), name: 'Schulterpresse (Maschine)', image: '', pause: 90, type: 'strength' };
          const ex2 = { id: generateId(), name: 'Rudermaschine sitzend', image: '', pause: 90, type: 'strength' };
          const ex3 = { id: generateId(), name: 'Laufband', image: '', pause: 60, type: 'cardio' };
          exercises = [ex1, ex2, ex3];
          const planId = generateId();
          plans = [{ id: planId, name: 'Ganzkörper', exerciseIds: [ex1.id, ex2.id, ex3.id] }];
          activePlanId = planId;
          logs = [{
            id: generateId(), planId: planId, date: getToday(), duration: 0,
            entries: [
              { exerciseId: ex1.id, sets: [{ kg: 28, wdh: 12 }, { kg: 28, wdh: 12 }, { kg: 28, wdh: 12 }], cardioData: { time: 0, distance: 0 }, notiz: '1kg pro Woche mehr', currentSetIndex: 0 },
              { exerciseId: ex2.id, sets: [{ kg: 60, wdh: 12 }], cardioData: { time: 0, distance: 0 }, notiz: '', currentSetIndex: 0 },
              { exerciseId: ex3.id, sets: [], cardioData: { time: 15, distance: 2.5 }, notiz: 'Steigung 2%', currentSetIndex: 0 }
            ]
          }];
          saveData();
        }
      }

      const stored = localStorage.getItem('bb_last_backup');
      if (stored) { lastBackupDate = stored; if (lastBackupDateSpan) lastBackupDateSpan.textContent = stored; }
    }

    // ========== LETZTE TRAININGSDATEN (ALLE SÄTZE) ==========
    function getLastTrainingDataForExercise(exerciseId) {
      const sortedLogs = [...logs].sort((a, b) => (a.date || '').localeCompare(b.date || '') * -1);
      for (const log of sortedLogs) {
        const entry = log.entries.find(e => e.exerciseId === exerciseId);
        if (entry) {
          return {
            sets: entry.sets || [{ kg: 0, wdh: 0 }],
            notiz: entry.notiz || '',
            currentSetIndex: entry.currentSetIndex || 0
          };
        }
      }
      return { sets: [{ kg: 0, wdh: 0 }], notiz: '', currentSetIndex: 0 };
    }

    // ========== VOLUMEN ==========
    function calcVolume(entry) {
      if (!entry.sets) return 0;
      return entry.sets.reduce((sum, set) => sum + (set.kg || 0) * (set.wdh || 0), 0);
    }

    // ========== TIMER (KREIS) ==========
    function drawTimerCircle(canvas, remaining, total) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const cx = w/2, cy = h/2, r = Math.min(w,h)/2 - 6;
      const progress = total > 0 ? remaining / total : 1;
      const startAngle = -Math.PI/2;
      const endAngle = startAngle + (progress * 2 * Math.PI);

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 5;
      ctx.stroke();

      const grad = ctx.createConicGradient(startAngle, cx, cy);
      grad.addColorStop(0, '#2ecc71');
      grad.addColorStop(0.5, '#f39c12');
      grad.addColorStop(1, '#e74c3c');
      ctx.beginPath();
      ctx.arc(cx, cy, r, startAngle, endAngle);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.stroke();

      if (remaining < 5 && remaining > 0) {
        ctx.shadowColor = '#e74c3c';
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.strokeStyle = 'rgba(231,76,60,0.3)';
        ctx.lineWidth = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    // ========== RENDER-FUNKTIONEN ==========
    function renderAll() {
      renderExercises(); renderPlans(); renderLogs();
      if (currentTab === 'calendar') renderCalendar();
      if (currentTab === 'stats') renderStats();
    }

    // ----- EXERCISES -----
    function renderExercises() {
      if (!exercises.length) {
        exerciseList.innerHTML = `<div class="empty-state"><i class="fas fa-dumbbell" style="font-size:2rem; display:block; margin-bottom:10px;"></i>Keine Übungen vorhanden.<br/>Klicke auf +, um eine anzulegen.</div>`;
        return;
      }
      exerciseList.innerHTML = exercises.map(ex => {
        let thumbHtml = '';
        if (ex.image && ex.image.startsWith('data:image')) {
          thumbHtml = `<img src="${ex.image}" alt="${ex.name}" />`;
        } else {
          const icon = getExerciseIcon(ex);
          thumbHtml = `<i class="fas ${icon}"></i>`;
        }
        return `
          <div class="list-item" data-id="${ex.id}">
            <div class="thumbnail">${thumbHtml}</div>
            <div class="info"><h4>${ex.name}</h4>
            <div class="sub">⏱️ ${formatTime(ex.pause || 90)} • ${ex.type === 'cardio' ? 'Cardio' : 'Kraft'}</div></div>
            <div class="actions">
              <button class="edit" data-id="${ex.id}" title="Bearbeiten"><i class="fas fa-edit"></i></button>
              <button class="del" data-id="${ex.id}" title="Löschen"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
      }).join('');
      exerciseList.querySelectorAll('.edit').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); openExerciseForm(btn.dataset.id); });
      });
      exerciseList.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); deleteExercise(btn.dataset.id); });
      });
      exerciseList.querySelectorAll('.list-item').forEach(item => {
        item.addEventListener('click', () => openExerciseForm(item.dataset.id));
      });
    }

    // ----- PLANS -----
    function renderPlans() {
      if (!plans.length) {
        planList.innerHTML = `<div class="empty-state"><i class="fas fa-list" style="font-size:2rem; display:block; margin-bottom:10px;"></i>Keine Trainingspläne.<br/>Klicke auf +, um einen zu erstellen.</div>`;
        return;
      }
      planList.innerHTML = plans.map(plan => {
        const isActive = plan.id === activePlanId;
        return `
          <div class="list-item" data-id="${plan.id}" style="${isActive ? 'border-left-color: #2ecc71;' : ''}">
            <div class="thumbnail"><i class="fas ${isActive ? 'fa-star' : 'fa-clipboard-list'}"></i></div>
            <div class="info">
              <h4>${plan.name} ${isActive ? '⭐' : ''}</h4>
              <div class="sub">🏋️ ${plan.exerciseIds ? plan.exerciseIds.length : 0} Übungen</div>
            </div>
            <div class="actions">
              <button class="star ${isActive ? 'active' : ''}" data-id="${plan.id}" title="Als aktiv markieren"><i class="fas fa-star"></i></button>
              <button class="edit" data-id="${plan.id}" title="Bearbeiten"><i class="fas fa-edit"></i></button>
              <button class="del" data-id="${plan.id}" title="Löschen"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
      }).join('');
      planList.querySelectorAll('.star').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (activePlanId === id) activePlanId = null;
          else activePlanId = id;
          saveData();
          renderPlans();
        });
      });
      planList.querySelectorAll('.edit').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); openPlanForm(btn.dataset.id); });
      });
      planList.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); deletePlan(btn.dataset.id); });
      });
      planList.querySelectorAll('.list-item').forEach(item => {
        item.addEventListener('click', () => openPlanForm(item.dataset.id));
      });
    }

    // ----- LOGS -----
    function renderLogs() {
      if (!logs.length) {
        logList.innerHTML = `<div class="empty-state"><i class="fas fa-history" style="font-size:2rem; display:block; margin-bottom:10px;"></i>Keine Trainingslogs.<br/>Klicke auf +, um ein Training zu protokollieren.</div>`;
        return;
      }
      const sorted = [...logs].sort((a, b) => (a.date || '').localeCompare(b.date || '') * -1);
      logList.innerHTML = sorted.map(log => {
        const plan = plans.find(p => p.id === log.planId);
        const planName = plan ? plan.name : 'unbekannter Plan';
        const exCount = log.entries ? log.entries.length : 0;
        return `
          <div class="list-item" data-id="${log.id}">
            <div class="thumbnail"><i class="fas fa-calendar-check"></i></div>
            <div class="info"><h4>${planName}</h4>
            <div class="sub">📅 ${formatDate(log.date)} • ${exCount} Übungen • ⏱️ ${formatDuration(log.duration || 0)}</div></div>
            <div class="actions">
              <button class="edit" data-id="${log.id}" title="Bearbeiten"><i class="fas fa-edit"></i></button>
              <button class="del" data-id="${log.id}" title="Löschen"><i class="fas fa-trash"></i></button>
            </div>
          </div>
        `;
      }).join('');
      logList.querySelectorAll('.edit').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); openLogForm(btn.dataset.id, false); });
      });
      logList.querySelectorAll('.del').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); deleteLog(btn.dataset.id); });
      });
      logList.querySelectorAll('.list-item').forEach(item => {
        item.addEventListener('click', () => openLogForm(item.dataset.id, false));
      });
    }

    // ========== CRUD-FUNKTIONEN ==========
    // ----- EXERCISE -----
    function openExerciseForm(id = null) {
      const isEdit = !!id;
      const ex = isEdit ? exercises.find(e => e.id === id) : null;
      editingId = id; editingType = 'exercise';
      detailContainer.style.display = 'block'; hideAllPages();
      detailContainer.innerHTML = `
        <div class="detail-card">
          <h3 style="margin-bottom:8px; font-size:1rem;">${isEdit ? 'Übung bearbeiten' : 'Neue Übung'}</h3>
          <div class="row"><label>Name</label><input type="text" id="formExName" value="${isEdit ? ex.name : ''}" placeholder="z.B. Bankdrücken" /></div>
          <div class="row"><label>Typ</label>
            <select id="formExType">
              <option value="strength" ${isEdit && ex.type === 'strength' ? 'selected' : ''}>Kraft (KG/WDH)</option>
              <option value="cardio" ${isEdit && ex.type === 'cardio' ? 'selected' : ''}>Cardio (Zeit/Distanz)</option>
            </select>
          </div>
          <div class="row"><label>Pause (Sek.)</label><input type="number" id="formExPause" value="${isEdit ? ex.pause : 90}" /></div>
          <div class="row" style="flex-direction:column; gap:4px;">
            <label>Bild (vom Gerät)</label>
            <input type="file" id="formExImageFile" accept="image/*" />
            ${isEdit && ex.image ? `<img src="${ex.image}" style="max-width:80px; border-radius:6px; margin-top:4px;" />` : ''}
          </div>
          <div class="btn-row">
            <button class="btn-save" id="btnSaveExercise">${isEdit ? 'Aktualisieren' : 'Speichern'}</button>
            <button class="btn-cancel" id="btnCancelDetail">Abbrechen</button>
            ${isEdit ? `<button class="btn-danger" id="btnDeleteExercise">Löschen</button>` : ''}
          </div>
        </div>
      `;
      document.getElementById('btnSaveExercise').addEventListener('click', () => saveExerciseForm());
      document.getElementById('btnCancelDetail').addEventListener('click', closeDetail);
      if (isEdit) {
        document.getElementById('btnDeleteExercise').addEventListener('click', () => { deleteExercise(id); closeDetail(); });
      }
    }

    function saveExerciseForm() {
      const name = document.getElementById('formExName').value.trim();
      if (!name) { alert('Bitte Namen eingeben.'); return; }
      const type = document.getElementById('formExType').value;
      const pause = parseInt(document.getElementById('formExPause').value) || 90;
      let image = '';
      const file = document.getElementById('formExImageFile').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) { image = e.target.result; saveExerciseFinal(name, type, pause, image); };
        reader.readAsDataURL(file);
        return;
      }
      if (editingId) { const ex = exercises.find(e => e.id === editingId); if (ex) image = ex.image || ''; }
      saveExerciseFinal(name, type, pause, image);
    }
    function saveExerciseFinal(name, type, pause, image) {
      if (editingId) {
        const ex = exercises.find(e => e.id === editingId);
        if (ex) { ex.name = name; ex.type = type; ex.pause = pause; if (image) ex.image = image; saveData(); renderAll(); closeDetail(); }
      } else {
        exercises.push({ id: generateId(), name, type, image, pause });
        saveData(); renderAll(); closeDetail();
      }
    }
    function deleteExercise(id) {
      if (!confirm('Übung löschen?')) return;
      exercises = exercises.filter(e => e.id !== id);
      plans.forEach(p => { p.exerciseIds = p.exerciseIds.filter(eid => eid !== id); });
      logs.forEach(log => { log.entries = log.entries.filter(entry => entry.exerciseId !== id); });
      saveData(); renderAll();
    }

    // ----- PLAN -----
    function openPlanForm(id = null) {
      const isEdit = !!id;
      const plan = isEdit ? plans.find(p => p.id === id) : null;
      editingId = id; editingType = 'plan';
      detailContainer.style.display = 'block'; hideAllPages();
      detailContainer.innerHTML = `
        <div class="detail-card">
          <h3 style="margin-bottom:8px; font-size:1rem;">${isEdit ? 'Plan bearbeiten' : 'Neuer Plan'}</h3>
          <div class="row"><label>Name</label><input type="text" id="formPlanName" value="${isEdit ? plan.name : ''}" placeholder="z.B. Push-Tag" /></div>
          <div class="row" style="flex-direction:column; gap:4px;">
            <label>Übungen (Reihenfolge durch Pfeile änderbar)</label>
            <ul class="plan-exercise-list" id="planExerciseList"></ul>
            <span style="font-size:0.6rem; color:#888;">✔ Auswählen, ⬆⬇ Reihenfolge ändern</span>
          </div>
          <div class="btn-row">
            <button class="btn-save" id="btnSavePlan">${isEdit ? 'Aktualisieren' : 'Speichern'}</button>
            <button class="btn-cancel" id="btnCancelDetail">Abbrechen</button>
            ${isEdit ? `<button class="btn-danger" id="btnDeletePlan">Löschen</button>` : ''}
          </div>
        </div>
      `;
      const listContainer = document.getElementById('planExerciseList');
      if (listContainer) updatePlanExerciseList(listContainer, plan ? plan.exerciseIds : []);
      document.getElementById('btnSavePlan').addEventListener('click', () => savePlanForm());
      document.getElementById('btnCancelDetail').addEventListener('click', closeDetail);
      if (isEdit) {
        document.getElementById('btnDeletePlan').addEventListener('click', () => { deletePlan(id); closeDetail(); });
      }
    }

    function updatePlanExerciseList(container, selectedIds) {
      if (!container) return;
      const selected = selectedIds || [];
      const available = exercises.filter(ex => !selected.includes(ex.id));
      const ordered = [];
      selected.forEach(id => { const ex = exercises.find(e => e.id === id); if (ex) ordered.push(ex); });
      available.sort((a, b) => a.name.localeCompare(b.name));
      const allItems = [...ordered, ...available];
      container.innerHTML = allItems.map((ex, index) => {
        const isChecked = selected.includes(ex.id);
        return `
          <li data-id="${ex.id}">
            <input type="checkbox" ${isChecked ? 'checked' : ''} />
            <span class="ex-name">${ex.name}</span>
            <span class="ex-type">(${ex.type === 'cardio' ? 'Cardio' : 'Kraft'})</span>
            <div class="move-buttons">
              <button class="move-up" data-id="${ex.id}" ${index === 0 ? 'disabled style="opacity:0.4;"' : ''}>⬆</button>
              <button class="move-down" data-id="${ex.id}" ${index === allItems.length-1 ? 'disabled style="opacity:0.4;"' : ''}>⬇</button>
            </div>
          </li>
        `;
      }).join('');
      container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', function() {
          const listItems = container.querySelectorAll('li');
          const selectedIds = [];
          listItems.forEach(li => {
            const cbx = li.querySelector('input[type="checkbox"]');
            if (cbx && cbx.checked) selectedIds.push(li.dataset.id);
          });
          updatePlanExerciseList(container, selectedIds);
        });
      });
      container.querySelectorAll('.move-up').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const li = this.closest('li');
          const prev = li.previousElementSibling;
          if (prev) { const parent = li.parentNode; parent.insertBefore(li, prev); updateOrderFromList(container); }
        });
      });
      container.querySelectorAll('.move-down').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const li = this.closest('li');
          const next = li.nextElementSibling;
          if (next) { const parent = li.parentNode; parent.insertBefore(next, li); updateOrderFromList(container); }
        });
      });
    }
    function updateOrderFromList(container) {
      const listItems = container.querySelectorAll('li');
      const selectedIds = [];
      listItems.forEach(li => {
        const cb = li.querySelector('input[type="checkbox"]');
        if (cb && cb.checked) selectedIds.push(li.dataset.id);
      });
      updatePlanExerciseList(container, selectedIds);
    }
    function savePlanForm() {
      const name = document.getElementById('formPlanName').value.trim();
      if (!name) { alert('Bitte Namen eingeben.'); return; }
      const listContainer = document.getElementById('planExerciseList');
      if (!listContainer) { alert('Fehler beim Laden der Übungsliste.'); return; }
      const listItems = listContainer.querySelectorAll('li');
      const exerciseIds = [];
      listItems.forEach(li => {
        const cb = li.querySelector('input[type="checkbox"]');
        if (cb && cb.checked) exerciseIds.push(li.dataset.id);
      });
      if (!exerciseIds.length) { alert('Bitte mindestens eine Übung auswählen.'); return; }
      if (editingId) {
        const plan = plans.find(p => p.id === editingId);
        if (plan) { plan.name = name; plan.exerciseIds = exerciseIds; saveData(); renderAll(); closeDetail(); }
      } else {
        plans.push({ id: generateId(), name, exerciseIds });
        saveData(); renderAll(); closeDetail();
      }
    }
    function deletePlan(id) {
      if (!confirm('Plan löschen?')) return;
      plans = plans.filter(p => p.id !== id);
      if (activePlanId === id) activePlanId = null;
      saveData(); renderAll();
    }

    // ========== QUICKSTART ==========
    function quickStart() {
      if (!activePlanId) {
        alert('Kein aktiver Plan ausgewählt. Markiere einen Plan mit ⭐ als aktiv.');
        showTab('plans');
        return;
      }
      const plan = plans.find(p => p.id === activePlanId);
      if (!plan) {
        alert('Der aktive Plan existiert nicht mehr. Wähle einen neuen aktiven Plan.');
        activePlanId = null;
        saveData();
        renderPlans();
        return;
      }

      const newLog = {
        id: generateId(),
        planId: activePlanId,
        date: getToday(),
        duration: 0,
        entries: plan.exerciseIds.map(exId => {
          const data = getLastTrainingDataForExercise(exId);
          return {
            exerciseId: exId,
            sets: data.sets,
            cardioData: { time: 0, distance: 0 },
            notiz: data.notiz,
            currentSetIndex: 0
          };
        })
      };
      logs.push(newLog);
      saveData();
      showTab('logs');
      openLogForm(newLog.id, true);
    }

    // ========== GESAMTTIMER ==========
    function startOverallTimer() {
      if (!overallTimerRunning) {
        overallTimerStart = Date.now();
        overallTimerRunning = true;
        if (overallTimerInterval) clearInterval(overallTimerInterval);
        overallTimerInterval = setInterval(updateOverallTimer, 1000);
        if (!wakeLockManual) requestWakeLock();
      }
    }
    function releaseOverallTimer() {
      if (overallTimerInterval) { clearInterval(overallTimerInterval); overallTimerInterval = null; }
      overallTimerRunning = false;
      overallTimerStart = null;
      releaseWakeLock();
      wakeLockManual = false;
    }
    function updateOverallTimer() {
      if (!overallTimerRunning || !overallTimerStart) {
        const display = document.getElementById('overallTimerDisplay');
        if (display) display.textContent = '⏸️ nicht gestartet';
        return;
      }
      const elapsed = Math.floor((Date.now() - overallTimerStart) / 1000);
      const display = document.getElementById('overallTimerDisplay');
      if (display) display.textContent = formatTime(elapsed);
    }

    // ========== LOG-FORMS (KERNLOGIK) ==========
    function openLogForm(id = null, startTimer = false) {
      const isEdit = !!id;
      let log = isEdit ? logs.find(l => l.id === id) : null;

      if (!isEdit) {
        log = { id: generateId(), planId: '', date: getToday(), duration: 0, entries: [] };
        editingId = log.id;
        logs.push(log);
        saveData();
        if (startTimer) startOverallTimer();
        else {
          overallTimerRunning = false; overallTimerStart = null;
          if (overallTimerInterval) { clearInterval(overallTimerInterval); overallTimerInterval = null; }
        }
      } else {
        editingId = id;
        if (!log.duration) log.duration = 0;
        if (startTimer) startOverallTimer();
        else {
          if (!overallTimerRunning) {
            overallTimerStart = null;
            if (overallTimerInterval) { clearInterval(overallTimerInterval); overallTimerInterval = null; }
          }
        }
      }
      editingType = 'log';
      detailContainer.style.display = 'block';
      hideAllPages();

      const planOptions = plans.map(p => `<option value="${p.id}" ${log.planId === p.id ? 'selected' : ''}>${p.name}</option>`).join('');
      const plan = plans.find(p => p.id === log.planId);

      // --- NEU: Bei bestehendem Log werden die gespeicherten Einträge verwendet ---
      let entries = [];
      let exerciseIds = [];
      if (isEdit) {
        entries = log.entries || [];
        exerciseIds = entries.map(e => e.exerciseId);
      } else {
        // Neues Log: Einträge aus Plan generieren (falls vorhanden)
        if (plan && plan.exerciseIds) {
          exerciseIds = plan.exerciseIds;
          entries = exerciseIds.map(exId => {
            const data = getLastTrainingDataForExercise(exId);
            return {
              exerciseId: exId,
              sets: data.sets,
              cardioData: { time: 0, distance: 0 },
              notiz: data.notiz,
              currentSetIndex: 0   // neues Training → bei 0 starten
            };
          });
          log.entries = entries;
          saveData();
        } else {
          entries = [];
          exerciseIds = [];
        }
      }

      // Falls im bestehenden Log der Plan gewechselt wurde, aber noch keine Einträge da sind
      if (isEdit && entries.length === 0 && plan && plan.exerciseIds) {
        exerciseIds = plan.exerciseIds;
        entries = exerciseIds.map(exId => {
          const data = getLastTrainingDataForExercise(exId);
          return {
            exerciseId: exId,
            sets: data.sets,
            cardioData: { time: 0, distance: 0 },
            notiz: data.notiz,
            currentSetIndex: 0
          };
        });
        log.entries = entries;
        saveData();
      }

      let totalVolume = 0;
      entries.forEach(entry => { totalVolume += calcVolume(entry); });

      // --- HTML generieren ---
      let exercisesHtml = '';
      if (exerciseIds.length) {
        exerciseIds.forEach((exId, idx) => {
          const ex = exercises.find(e => e.id === exId);
          if (!ex) return;
          const entry = entries.find(e => e.exerciseId === exId) || { exerciseId: exId, sets: [{ kg: 0, wdh: 0 }], cardioData: { time: 0, distance: 0 }, notiz: '', currentSetIndex: 0 };
          const sets = entry.sets || [{ kg: 0, wdh: 0 }];
          const currentSetIdx = entry.currentSetIndex || 0;

          let setHtml = '';
          let exVolume = 0;
          if (ex.type === 'cardio') {
            const time = entry.cardioData?.time || 0;
            const dist = entry.cardioData?.distance || 0;
            setHtml = `
              <div class="cardio-row">
                <label>⏱️ Zeit (min)</label>
                <input type="number" class="cardio-time" value="${time}" step="0.5" data-logid="${log.id}" data-exid="${exId}" />
                <label>📏 Distanz (km)</label>
                <input type="number" class="cardio-dist" value="${dist}" step="0.1" data-logid="${log.id}" data-exid="${exId}" />
              </div>
            `;
            exVolume = 0;
          } else {
            exVolume = calcVolume(entry);
            totalVolume += exVolume;
            let setRows = sets.map((set, si) => {
              const isDone = si < currentSetIdx;
              const isActive = si === currentSetIdx;
              let classes = '';
              if (isDone) classes = 'done';
              else if (isActive) classes = 'active';
              return `
                <tr data-setidx="${si}">
                  <td class="set-number ${classes}">${si+1}</td>
                  <td>
                    <div class="set-controls">
                      <button class="dec" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}" data-field="kg" data-step="0.5">−</button>
                      <input type="number" class="set-kg" value="${set.kg}" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}" step="0.5" />
                      <button class="inc" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}" data-field="kg" data-step="0.5">+</button>
                    </div>
                  </td>
                  <td>
                    <div class="set-controls">
                      <button class="dec" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}" data-field="wdh" data-step="1">−</button>
                      <input type="number" class="set-wdh" value="${set.wdh}" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}" step="1" />
                      <button class="inc" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}" data-field="wdh" data-step="1">+</button>
                    </div>
                  </td>
                  <td><button class="btn-remove-set" data-logid="${log.id}" data-exid="${exId}" data-idx="${si}">✕</button></td>
                </tr>
              `;
            }).join('');

            setHtml = `
              <div class="set-progress">
                <span>Satz <span class="current-set-label">${Math.min(currentSetIdx + 1, sets.length)}</span> von ${sets.length}</span>
                <span style="color:#888;">(Klick auf Satzzeile zum Markieren als erledigt)</span>
              </div>
              <table class="sets-table">
                <thead><tr><th>Satz</th><th>KG</th><th>WDH</th><th></th></tr></thead>
                <tbody>${setRows}</tbody>
              </table>
              <div class="ex-actions-row">
                <button class="btn-add-set" data-logid="${log.id}" data-exid="${exId}"><i class="fas fa-plus-circle"></i> Satz</button>
              </div>
            `;
          }

          exercisesHtml += `
            <div class="exercise-entry" data-exid="${exId}" data-logid="${log.id}">
              <div class="ex-header">
                <span class="ex-name">${ex.name} ${ex.type === 'cardio' ? '🏃' : '🏋️'}</span>
                <div class="ex-actions">
                  <button class="del" data-exid="${exId}" title="Aus Log entfernen" style="background:none; border:none; color:#e74c3c; cursor:pointer;">✕</button>
                </div>
              </div>
              ${ex.image ? `<img src="${ex.image}" alt="${ex.name}" />` : ''}
              <div style="margin:2px 0; font-size:0.7rem; color:#aaa;">Pause: ${formatTime(ex.pause || 90)}</div>
              <div class="timer-wrapper" id="timer-wrapper-${log.id}-${exId}">
                <canvas id="timer-${log.id}-${exId}-canvas" width="64" height="64"></canvas>
                <div class="timer-text" id="timer-${log.id}-${exId}">${formatTime(ex.pause || 90)}<span class="sub">Pause</span></div>
              </div>
              <div class="ex-actions-row">
                <button class="btn-timer" data-logid="${log.id}" data-exid="${exId}"><i class="fas fa-play"></i> Timer starten</button>
              </div>
              ${setHtml}
              ${ex.type === 'strength' ? `<div style="font-size:0.7rem; color:#aaa; text-align:right;">Volumen: ${exVolume} kg</div>` : ''}
              <div class="ex-notiz">
                <textarea class="ex-notiz-text" data-logid="${log.id}" data-exid="${exId}" placeholder="Notiz ...">${entry.notiz || ''}</textarea>
              </div>
            </div>
          `;
        });
      } else {
        exercisesHtml = `<div class="empty-state" style="padding:10px 0;">Wähle einen Plan aus, um Übungen zu laden.</div>`;
      }

      let chartHtml = '';
      if (isEdit && exerciseIds.length) {
        const firstStrength = exerciseIds.find(id => { const ex = exercises.find(e => e.id === id); return ex && ex.type === 'strength'; });
        if (firstStrength) {
          chartHtml = `
            <div class="chart-container" id="chartContainer">
              <div style="font-size:0.7rem; color:#aaa; margin-bottom:4px;">📈 KG-Verlauf (${exercises.find(e=>e.id===firstStrength)?.name})</div>
            </div>
          `;
        }
      }

      let timerButtonHtml = '';
      if (!overallTimerRunning) {
        timerButtonHtml = `<button class="btn-save" id="btnStartOverallTimer" style="margin-bottom:4px; font-size:0.85rem; padding:8px 12px;"><i class="fas fa-play"></i> Training starten</button>`;
      }

      const wakeToggleHtml = `
        <div style="display:flex; align-items:center; gap:6px; margin:4px 0 6px; flex-wrap:wrap;">
          <span style="font-size:0.7rem; color:#aaa;">🖥️ Bildschirm:</span>
          <div class="wake-toggle ${wakeLock ? 'active' : ''}" id="wakeToggleBtn" style="cursor:pointer;">
            <i class="fas fa-desktop"></i> ${wakeLock ? 'an' : 'aus'}
          </div>
        </div>
      `;

      detailContainer.innerHTML = `
        <div class="detail-card">
          <h3 style="margin-bottom:6px; font-size:0.95rem;">${isEdit ? 'Training bearbeiten' : 'Neues Training'}</h3>
          ${timerButtonHtml}
          ${wakeToggleHtml}
          <div class="row"><label>Plan</label><select id="formLogPlan"><option value="">-- Plan wählen --</option>${planOptions}</select></div>
          <div class="row"><label>Datum</label><input type="date" id="formLogDate" value="${log.date || getToday()}" /></div>
          <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.04); padding:4px 8px; border-radius:10px; margin-bottom:4px;">
            <span style="font-size:0.7rem; color:#aaa;">⏱️ Trainingsdauer:</span>
            <span id="overallTimerDisplay" style="font-weight:700; color:#2ecc71; font-size:0.85rem;">${overallTimerRunning ? '00:00' : '⏸️ nicht gestartet'}</span>
          </div>
          <div class="volume-summary">
            <div class="item"><span class="label">Gesamtvolumen</span><span class="value" id="totalVolumeDisplay">${totalVolume} kg</span></div>
            <div class="item"><span class="label">Übungen</span><span class="value">${exerciseIds.length}</span></div>
          </div>
          ${chartHtml}
          <div id="logExercisesContainer">${exercisesHtml}</div>
          <div class="btn-row">
            <button class="btn-save" id="btnSaveLog">${isEdit ? 'Aktualisieren' : 'Speichern'}</button>
            <button class="btn-cancel" id="btnCancelDetail">Abbrechen</button>
            ${isEdit ? `<button class="btn-danger" id="btnDeleteLog">Löschen</button>` : ''}
          </div>
        </div>
      `;

      // ===== EVENT-LISTENER =====
      document.getElementById('wakeToggleBtn')?.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleWakeLock();
      });

      document.getElementById('btnStartOverallTimer')?.addEventListener('click', function() {
        if (!overallTimerRunning) {
          startOverallTimer();
          this.style.display = 'none';
          const display = document.getElementById('overallTimerDisplay');
          if (display) display.textContent = '00:00';
          updateWakeToggleUI(true);
        }
      });

      // Plan-Änderung (NEU: mit aktuellen Trainingsdaten)
      document.getElementById('formLogPlan')?.addEventListener('change', function() {
        const newPlanId = this.value;
        collectLogEntries(editingId);
        const logObj = logs.find(l => l.id === editingId);
        if (logObj) {
          logObj.planId = newPlanId;
          const planObj = plans.find(p => p.id === newPlanId);
          if (planObj && planObj.exerciseIds) {
            logObj.entries = planObj.exerciseIds.map(exId => {
              const data = getLastTrainingDataForExercise(exId);
              return {
                exerciseId: exId,
                sets: data.sets,
                cardioData: { time: 0, distance: 0 },
                notiz: data.notiz,
                currentSetIndex: 0
              };
            });
          } else {
            logObj.entries = [];
          }
          saveData();
        }
        openLogForm(editingId, overallTimerRunning);
      });

      document.getElementById('btnSaveLog').addEventListener('click', () => saveLogForm());
      document.getElementById('btnCancelDetail').addEventListener('click', closeDetail);
      if (isEdit) {
        document.getElementById('btnDeleteLog').addEventListener('click', () => { deleteLog(id); closeDetail(); });
      }

      // Zeichne Timer-Kreise initial
      exerciseIds.forEach(exId => {
        const ex = exercises.find(e => e.id === exId);
        if (!ex) return;
        const canvas = document.getElementById(`timer-${editingId}-${exId}-canvas`);
        if (canvas) {
          const pause = ex.pause || 90;
          drawTimerCircle(canvas, pause, pause);
        }
      });

      // Chart
      if (isEdit && exerciseIds.length) {
        const firstStrength = exerciseIds.find(id => { const ex = exercises.find(e => e.id === id); return ex && ex.type === 'strength'; });
        if (firstStrength && document.getElementById('chartContainer')) {
          renderChart(firstStrength, document.getElementById('chartContainer'));
        }
      }

      updateOverallTimer();
    }

    // ========== LOG-OPERATIONEN ==========
    function collectLogEntries(logId) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      const blocks = document.querySelectorAll('.exercise-entry');
      const entries = [];
      blocks.forEach(block => {
        const exId = block.dataset.exid;
        const ex = exercises.find(e => e.id === exId);
        if (!ex) return;
        let sets = [];
        let cardioData = { time: 0, distance: 0 };
        if (ex.type === 'cardio') {
          const ti = block.querySelector('.cardio-time');
          const di = block.querySelector('.cardio-dist');
          if (ti) cardioData.time = parseFloat(ti.value) || 0;
          if (di) cardioData.distance = parseFloat(di.value) || 0;
        } else {
          const kgs = block.querySelectorAll('.set-kg');
          const wdhs = block.querySelectorAll('.set-wdh');
          kgs.forEach((inp, i) => {
            const kg = parseFloat(inp.value) || 0;
            const wdh = parseInt(wdhs[i]?.value) || 0;
            sets.push({ kg, wdh });
          });
        }
        const existingEntry = log.entries.find(e => e.exerciseId === exId);
        const currentSetIndex = existingEntry ? existingEntry.currentSetIndex || 0 : 0;
        const notiz = block.querySelector('.ex-notiz-text')?.value || '';
        entries.push({ exerciseId: exId, sets, cardioData, notiz, currentSetIndex });
      });
      log.entries = entries;
    }

    function addSetToLogEntry(logId, exId) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      let entry = log.entries.find(e => e.exerciseId === exId);
      if (!entry) { entry = { exerciseId: exId, sets: [], cardioData: { time: 0, distance: 0 }, notiz: '', currentSetIndex: 0 }; log.entries.push(entry); }
      const last = entry.sets[entry.sets.length - 1] || { kg: 0, wdh: 0 };
      entry.sets.push({ kg: last.kg, wdh: last.wdh });
      if ((entry.currentSetIndex || 0) >= entry.sets.length) entry.currentSetIndex = entry.sets.length - 1;
      saveData(); openLogForm(logId, overallTimerRunning);
    }

    function removeSetFromLogEntry(logId, exId, idx) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      const entry = log.entries.find(e => e.exerciseId === exId);
      if (!entry || entry.sets.length <= 1) { alert('Mindestens ein Satz muss bleiben.'); return; }
      entry.sets.splice(idx, 1);
      if ((entry.currentSetIndex || 0) >= entry.sets.length) entry.currentSetIndex = entry.sets.length - 1;
      saveData(); openLogForm(logId, overallTimerRunning);
    }

    function updateSetValueInLog(logId, exId, idx, field, value) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      const entry = log.entries.find(e => e.exerciseId === exId);
      if (!entry || !entry.sets[idx]) return;
      entry.sets[idx][field] = value;
      saveData();
    }

    function updateCardioData(logId, exId, field, value) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      let entry = log.entries.find(e => e.exerciseId === exId);
      if (!entry) { entry = { exerciseId: exId, sets: [], cardioData: { time: 0, distance: 0 }, notiz: '', currentSetIndex: 0 }; log.entries.push(entry); }
      entry.cardioData[field] = value;
      saveData();
    }

    function updateNotizInLog(logId, exId, value) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      let entry = log.entries.find(e => e.exerciseId === exId);
      if (!entry) { entry = { exerciseId: exId, sets: [], cardioData: { time: 0, distance: 0 }, notiz: '', currentSetIndex: 0 }; log.entries.push(entry); }
      entry.notiz = value;
      saveData();
    }

    function removeExerciseFromLog(logId, exId) {
      const log = logs.find(l => l.id === logId);
      if (!log) return;
      log.entries = log.entries.filter(e => e.exerciseId !== exId);
      saveData(); openLogForm(logId, overallTimerRunning);
    }

    function saveLogForm() {
      const logId = editingId;
      let log = logs.find(l => l.id === logId);
      if (!log) { log = { id: logId, planId: '', date: getToday(), duration: 0, entries: [] }; logs.push(log); }
      if (overallTimerRunning && overallTimerStart) {
        const elapsed = Math.floor((Date.now() - overallTimerStart) / 1000);
        log.duration = (log.duration || 0) + elapsed;
        releaseOverallTimer();
      }
      const dateInput = document.getElementById('formLogDate');
      if (dateInput) log.date = dateInput.value || getToday();
      const planId = document.getElementById('formLogPlan').value;
      log.planId = planId;
      collectLogEntries(logId);
      saveData(); renderAll(); closeDetail();
    }

    function deleteLog(id) {
      if (!confirm('Training aus dem Log löschen?')) return;
      logs = logs.filter(l => l.id !== id);
      saveData(); renderAll();
    }

    // ========== CHART ==========
    function renderChart(exerciseId, container) {
      const logsForEx = logs.filter(log => log.entries.some(e => e.exerciseId === exerciseId && e.sets && e.sets.length > 0));
      if (logsForEx.length < 2) {
        container.innerHTML = `<div style="text-align:center; color:#666; padding:8px; font-size:0.75rem;">Nicht genug Daten für Diagramm (mind. 2 Trainings nötig).</div>`;
        return;
      }
      logsForEx.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      const data = logsForEx.map(log => {
        const entry = log.entries.find(e => e.exerciseId === exerciseId);
        if (!entry) return null;
        const maxKg = entry.sets.reduce((max, set) => Math.max(max, set.kg || 0), 0);
        return { date: log.date, kg: maxKg };
      }).filter(d => d !== null);
      if (data.length < 2) {
        container.innerHTML = `<div style="text-align:center; color:#666; padding:8px; font-size:0.75rem;">Nicht genug Daten für Diagramm.</div>`;
        return;
      }
      const canvas = document.createElement('canvas');
      container.innerHTML = '';
      container.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      const width = container.clientWidth || 300;
      const height = 80;
      canvas.width = width * 2;
      canvas.height = height * 2;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(2, 2);
      const padding = { top: 8, bottom: 16, left: 24, right: 8 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      const maxKg = Math.max(...data.map(d => d.kg)) * 1.1;
      const minKg = Math.min(...data.map(d => d.kg)) * 0.9;
      const range = maxKg - minKg || 1;
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, width, height);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(padding.left, padding.top);
      ctx.lineTo(padding.left, height - padding.bottom);
      ctx.lineTo(width - padding.right, height - padding.bottom);
      ctx.stroke();
      if (data.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = '#2ecc71';
        ctx.lineWidth = 1.5;
        data.forEach((d, i) => {
          const x = padding.left + (i / (data.length - 1)) * chartWidth;
          const y = padding.top + chartHeight - ((d.kg - minKg) / range) * chartHeight;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        data.forEach((d, i) => {
          const x = padding.left + (i / (data.length - 1)) * chartWidth;
          const y = padding.top + chartHeight - ((d.kg - minKg) / range) * chartHeight;
          ctx.fillStyle = '#2ecc71';
          ctx.beginPath();
          ctx.arc(x, y, 2.5, 0, 2 * Math.PI);
          ctx.fill();
          ctx.fillStyle = '#888';
          ctx.font = '6px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(formatDate(d.date), x, height - 4);
        });
      }
      ctx.fillStyle = '#aaa';
      ctx.font = '6px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(Math.round(maxKg) + 'kg', padding.left - 2, padding.top + 8);
      ctx.fillText(Math.round(minKg) + 'kg', padding.left - 2, height - padding.bottom - 2);
    }

    // ========== PAUSENTIMER (KEINE HAKEN, KEINE MELDUNG) ==========
    function updateTimerDisplay() {
      if (!timerRunning) return;
      const now = Date.now();
      const elapsed = (now - timerStartTime) / 1000;
      const remaining = Math.max(0, timerTotalSeconds - elapsed);
      timerRemainingSeconds = remaining;
      const display = document.getElementById(`timer-${currentTimerLogId}-${currentTimerExId}`);
      if (display) {
        display.textContent = formatTime(remaining);
        const canvas = document.getElementById(`timer-${currentTimerLogId}-${currentTimerExId}-canvas`);
        if (canvas) drawTimerCircle(canvas, remaining, timerTotalSeconds);
        if (remaining <= 0) display.classList.add('alarm');
        else display.classList.remove('alarm');
      }

      if (remaining <= 0) {
        // Timer abgelaufen – einfach stoppen und zurücksetzen, ohne Haken oder Meldung
        clearInterval(timerInterval);
        timerInterval = null;
        timerRunning = false;

        // Button zurücksetzen
        document.querySelectorAll('.btn-timer').forEach(b => {
          if (b.dataset.logid === currentTimerLogId && b.dataset.exid === currentTimerExId) {
            b.innerHTML = '<i class="fas fa-play"></i> Timer starten';
            b.classList.remove('active');
          }
        });

        // Anzeige auf Pausenwert zurücksetzen
        const ex = exercises.find(e => e.id === currentTimerExId);
        const pauseSec = ex ? ex.pause || 90 : 90;
        const displayEl = document.getElementById(`timer-${currentTimerLogId}-${currentTimerExId}`);
        if (displayEl) {
